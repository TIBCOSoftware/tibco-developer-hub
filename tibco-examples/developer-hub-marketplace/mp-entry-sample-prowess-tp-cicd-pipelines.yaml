apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-sample-prowess-tp-cicd-pipelines
  title: TIBCO Platform CI/CD Pipelines
  description: Three reusable Azure DevOps pipelines (Build, Deploy, Supplements)
    contributed by Prowess that automate the lifecycle of TIBCO BusinessWorks 6
    (BW6) applications across multi-cloud Kubernetes environments (AKS, EKS,
    GKE) via the TIBCO Platform Build & Deploy APIs.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: false
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: TIBCO Platform
        url: https://www.tibco.com/platform
        icon: star
      - icon: github
        text: Marketplace Source
        url: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/platform/cicd-pipelines/
  tags:
    - devhub-marketplace
    - ci-cd
    - azure-devops
    - bwce
    - tibco-platform
    - kubernetes
    - multi-cloud
    - prowess
    - partner-contribution
spec:
  owner: group:default/prowess
  type: sample
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  TIBCO Platform CI/CD Pipelines added to your TIBCO Developer Hub

            **ID:** mp-entry-sample-prowess-tp-cicd-pipelines

            **Description:** Three reusable Azure DevOps pipelines (Build, Deploy, Supplements) contributed by Prowess that automate the lifecycle of TIBCO BusinessWorks 6 (BW6) applications across multi-cloud Kubernetes environments (AKS, EKS, GKE) via the TIBCO Platform Build & Deploy APIs. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/platform/cicd-pipelines/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - icon: catalog
        title: Open TIBCO Platform CI/CD Pipelines
        url: /catalog/default/system/tp-cicd-pipelines
        type: openButton
      - title: Documents
        url: /docs?filters%5Buser%5D=all&limit=20
        icon: techdocs
      - icon: docs
        title: Open TIBCO Platform CI/CD Pipelines Docs
        url: /docs/default/system/tp-cicd-pipelines
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
