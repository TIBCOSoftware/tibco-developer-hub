apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-template-flogo-ai-supply-chain
  title: Smart Supply Chain Assistant
  description: A procurement intelligence assistant demonstrating the List of MCP
    Servers and Custom Tool features of the TIBCO Flogo Agentic AI Connector.
    Connects a single AI Agent to multiple MCP servers simultaneously for
    inventory and supplier data, with a custom Flogo tool for creating purchase
    orders — all through natural language.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: true
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: Flogo Agentic AI
        url: https://docs.tibco.com/pub/flogo/latest/doc/html/Default.htm#connectors/agentic-AI/agentic-AI-overview.htm
        icon: docs
      - text: Agentic AI Samples
        url: https://github.com/TIBCOSoftware/flogo-enterprise-hub/tree/master/samples/Agentic_AI/
        icon: github
  tags:
    - devhub-marketplace
    - artificial-intelligence
    - agentic-ai
    - supply-chain
    - mcp
    - procurement
    - flogo
spec:
  owner: group:default/marketplace-entries-group
  type: artificial-intelligence
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Smart Supply Chain Assistant added to your TIBCO Developer Hub

            **ID:** mp-entry-template-flogo-ai-supply-chain

            **Description:** A procurement intelligence assistant demonstrating the List of MCP Servers and Custom Tool features of the TIBCO Flogo Agentic AI Connector. Connects a single AI Agent to multiple MCP servers simultaneously for inventory and supplier data, with a custom Flogo tool for creating purchase orders — all through natural language. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/flogo-enterprise-hub//blob/master/LICENSE).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/flogo-ai-agents/template-flogo-ai-supply-chain.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Templates
        url: /create?filters%5Bkind%5D=template&filters%5Buser%5D=all&limit=20
        icon: kind:template
      - icon: kind:template
        title: Run Smart Supply Chain Assistant Template
        url: /create/templates/default/template-flogo-ai-supply-chain
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
