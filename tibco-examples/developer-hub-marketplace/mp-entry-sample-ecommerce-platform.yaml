apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-sample-ecommerce-platform
  title: E-Commerce Platform Solution
  description: Comprehensive e-commerce platform with microservices architecture
    including APIs for catalog, cart, checkout, shipment tracking, and team
    structures. Features complete documentation, API specifications, and
    organizational structure for enterprise retail solutions.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: true
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: Documentation
        url: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/e-commerce-platform/docs/index.md
        icon: docs
      - text: GitHub Repository
        icon: github
        url: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/e-commerce-platform
  tags:
    - devhub-marketplace
    - ecommerce
    - platform
    - microservices
    - apis
    - retail
    - enterprise
    - system
    - complete-solution
spec:
  owner: group:default/marketplace-entries-group
  type: sample
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  E-Commerce Platform Solution added to your TIBCO Developer Hub

            **ID:** mp-entry-sample-ecommerce-platform

            **Description:** Comprehensive e-commerce platform with microservices architecture including APIs for catalog, cart, checkout, shipment tracking, and team structures. Features complete documentation, API specifications, and organizational structure for enterprise retail solutions. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/e-commerce-platform/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - icon: system
        title: E-Commerce System
        url: /catalog/default/system/ecommerce-platform
        type: openButton
      - icon: domain
        title: E-Commerce Domain
        url: /catalog/default/domain/e-commerce
      - icon: group
        title: E-Commerce Teams
        url: /catalog/default/group/ecommerce-team
      - icon: api
        title: API Collection
        url: /api-docs?filters%5Bkind%5D=api&filters%5Buser%5D=all
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
