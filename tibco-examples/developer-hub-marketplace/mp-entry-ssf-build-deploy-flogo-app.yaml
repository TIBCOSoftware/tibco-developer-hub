apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-ssf-build-deploy-flogo-app
  title: Build & Deploy Flogo App
  description: A Self Service Flow that builds and deploys a Flogo application to
    a dynamically selected TIBCO Data Plane. Uses the CapabilitySelector to pick
    a data plane with a healthy Flogo capability, auto-provisions the Flogo
    capability version and General connector if missing, builds the app from a
    supplied Flogo configuration, deploys it, makes the endpoint public and
    registers the app in the TIBCO Developer Hub catalog.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: false
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: TIBCO Platform
        url: https://www.tibco.com/platform
        icon: star
      - text: Flogo
        url: https://www.tibco.com/content/dam/tibco/documents/data-sheet/tibco-flogo-enterprise.pdf
        icon: docs
      - text: Samples
        url: https://github.com/TIBCOSoftware/flogo-enterprise-hub/
        icon: github
      - text: Sample Flogo App
        url: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/developer-hub/self-service-flows/build-deploy-flogo-app/sample-app/sample-app-flogo-restApp.txt
        icon: github
  tags:
    - devhub-marketplace
    - tibco-platform
    - flogo
spec:
  owner: group:default/marketplace-entries-group
  type: self-service
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Build & Deploy Flogo App added to your TIBCO Developer Hub

            **ID:** mp-entry-ssf-build-deploy-flogo-app

            **Description:** A Self Service Flow that builds and deploys a Flogo application to a dynamically selected TIBCO Data Plane. Uses the CapabilitySelector to pick a data plane with a healthy Flogo capability, auto-provisions the Flogo capability version and General connector if missing, builds the app from a supplied Flogo configuration, deploys it, makes the endpoint public and registers the app in the TIBCO Developer Hub catalog. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/developer-hub/self-service-flows/build-deploy-flogo-app/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Self Service Flows
        url: /self-service-flow?filters%5Bkind%5D=template&filters%5Buser%5D=all&limit=20
        icon: kind:template
      - icon: kind:template
        title: Run Build & Deploy Flogo App
        url: /create/templates/default/self-service-build-deploy-flogo-app
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
