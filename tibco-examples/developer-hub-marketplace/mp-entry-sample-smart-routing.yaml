apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-sample-smart-routing
  title: Smart Routing
  description: Configurable, database-driven document router for TIBCO
    integrations contributed by Federico Preiato. Routes documents to one or
    more downstream systems based on rules in a SQL Server catalog, with
    per-route JOLT JSON-to-JSON transformations and per-system timeout/retry
    settings.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: false
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - icon: github
        text: TIBCO-SmartRouting on GitHub
        url: https://github.com/FPreiato2024/TIBCO-SmartRouting
      - icon: github
        text: Marketplace Source
        url: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/smart-routing/
      - text: TIBCO Platform
        url: https://www.tibco.com/platform
        icon: star
  tags:
    - devhub-marketplace
    - routing
    - integration
    - jolt
    - sql-server
    - partner-contribution
spec:
  owner: group:default/key-partner
  type: sample
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Smart Routing added to your TIBCO Developer Hub

            **ID:** mp-entry-sample-smart-routing

            **Description:** Configurable, database-driven document router for TIBCO integrations contributed by Federico Preiato. Routes documents to one or more downstream systems based on rules in a SQL Server catalog, with per-route JOLT JSON-to-JSON transformations and per-system timeout/retry settings. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/FPreiato2024/TIBCO-SmartRouting/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/smart-routing/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - icon: catalog
        title: Open Smart Routing
        url: /catalog/default/system/smart-routing
        type: openButton
      - title: Documents
        url: /docs?filters%5Buser%5D=all&limit=20
        icon: techdocs
      - icon: docs
        title: Open Smart Routing Docs
        url: /docs/default/system/smart-routing
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
