apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-developer-hub-skill-library
  title: Developer Hub Skills Library
  description: Skills for AI coding agents (Claude Code, Codex, Cursor, and more)
    to set up, extend, and customize the TIBCO Developer Hub. Bundles nine
    executable SKILL.md runbooks covering the full lifecycle — bootstrap a local
    environment, author Software Templates, Import Flows, and Self Service Flows
    that drive the TIBCO Platform APIs, build a custom theme, test them all
    end-to-end, and analyze the impact of a change across the catalog — plus an
    AGENTS.md for cross-agent compatibility. Install the documentation, then
    drop the skills into your Developer Hub checkout.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: true
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: TIBCO Developer Hub
        url: https://github.com/TIBCOSoftware/tibco-developer-hub
        icon: github
      - icon: docs
        text: Skills
        url: https://agentskills.io/home
      - icon: github
        text: Developer Hub Skills
        url: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/developer-hub/skills/skill-library
  tags:
    - devhub-marketplace
    - artificial-intelligence
    - coding-agents
    - skills
    - developer-hub
    - developer-productivity
spec:
  owner: group:default/marketplace-entries-group
  type: artificial-intelligence
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Developer Hub Skills Library added to your TIBCO Developer Hub

            **ID:** mp-entry-developer-hub-skill-library

            **Description:** Skills for AI coding agents (Claude Code, Codex, Cursor, and more) to set up, extend, and customize the TIBCO Developer Hub. Bundles nine executable SKILL.md runbooks covering the full lifecycle — bootstrap a local environment, author Software Templates, Import Flows, and Self Service Flows that drive the TIBCO Platform APIs, build a custom theme, test them all end-to-end, and analyze the impact of a change across the catalog — plus an AGENTS.md for cross-agent compatibility. Install the documentation, then drop the skills into your Developer Hub checkout. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/developer-hub/skills/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Documents
        url: /docs?filters%5Buser%5D=all&limit=20
        icon: techdocs
      - icon: docs
        title: Open Developer Hub Skills Library Docs
        url: /docs/default/system/developer-hub-skill-library
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
