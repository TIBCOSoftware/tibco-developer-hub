apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-template-flogo-ai-healthcare-compliance
  title: Healthcare Compliance Agent
  description: A HIPAA-aware patient support assistant built with the TIBCO Flogo
    Agentic AI Connector. Features custom PHI guardrails that redact SSN, DOB,
    and MRN from every LLM interaction, a file-based custom conversation store
    for audit trails, and custom tool handlers for appointment scheduling,
    clinic finding, and medication guidance.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: true
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: Flogo Agentic AI
        url: https://docs.tibco.com/pub/flogo/latest/doc/html/Default.htm#connectors/agentic-AI/agentic-AI-overview.htm
        icon: docs
      - text: Agentic AI Samples
        url: https://github.com/TIBCOSoftware/flogo-enterprise-hub/tree/master/samples/Agentic_AI/
        icon: github
  tags:
    - devhub-marketplace
    - artificial-intelligence
    - agentic-ai
    - healthcare
    - hipaa
    - guardrails
    - flogo
spec:
  owner: group:default/marketplace-entries-group
  type: artificial-intelligence
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Healthcare Compliance Agent added to your TIBCO Developer Hub

            **ID:** mp-entry-template-flogo-ai-healthcare-compliance

            **Description:** A HIPAA-aware patient support assistant built with the TIBCO Flogo Agentic AI Connector. Features custom PHI guardrails that redact SSN, DOB, and MRN from every LLM interaction, a file-based custom conversation store for audit trails, and custom tool handlers for appointment scheduling, clinic finding, and medication guidance. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/flogo-enterprise-hub//blob/master/LICENSE).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/tibco-examples/developer-hub-marketplace-content/flogo-ai-agents/template-flogo-ai-healthcare-compliance.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Templates
        url: /create?filters%5Bkind%5D=template&filters%5Buser%5D=all&limit=20
        icon: kind:template
      - icon: kind:template
        title: Run Healthcare Compliance Agent Template
        url: /create/templates/default/template-flogo-ai-healthcare-compliance
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
