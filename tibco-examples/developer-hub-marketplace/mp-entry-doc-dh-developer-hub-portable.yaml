apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-doc-dh-developer-hub-portable
  title: Developer Hub Portable
  description: Documentation on how to run the TIBCO Developer Hub Portable — the
    full Developer Hub (UI and API) on your own machine with a single command.
    No Docker, no Postgres, no install wizard. This documentation covers
    installing and starting the hub, choosing between the standard and
    self-contained TechDocs builds, selecting a port, loading your own catalog,
    resetting your data, adding a GitHub token, and troubleshooting.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: true
    popularity: 0
    isMultiInstall: false
    imageURL: https://raw.githubusercontent.com/TIBCOSoftware/tibco-developer-hub/main/DevHub_Portable/images/devhub-portable-hero.webp
    moreInfo:
      - text: TIBCO Developer Hub
        url: https://github.com/TIBCOSoftware/tibco-developer-hub
        icon: github
  tags:
    - devhub-marketplace
    - tibco-developer-hub
    - developer-hub-portable
    - getting-started
spec:
  owner: group:default/marketplace-entries-group
  type: document
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  Developer Hub Portable added to your TIBCO Developer Hub

            **ID:** mp-entry-doc-dh-developer-hub-portable

            **Description:** Documentation on how to run the TIBCO Developer Hub Portable — the full Developer Hub (UI and API) on your own machine with a single command. No Docker, no Postgres, no install wizard. This documentation covers installing and starting the hub, choosing between the standard and self-contained TechDocs builds, selecting a port, loading your own catalog, resetting your data, adding a GitHub token, and troubleshooting. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/developer-hub/tutorials/developer-hub-portable/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Documents
        url: /docs?filters%5Buser%5D=all&limit=20
        icon: techdocs
      - icon: docs
        title: Open Developer Hub Portable Docs
        url: /docs/default/System/developer-hub-portable
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
