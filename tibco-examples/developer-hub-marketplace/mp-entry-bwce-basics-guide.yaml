apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: mp-entry-bwce-basics-guide
  title: BW6 Basics Learning Guide
  description: Comprehensive learning guide for TIBCO BusinessWorks 6 (BW6)
    fundamentals, featuring hands-on tutorials, sample applications, and
    practical exercises for developers new to BW6.
  backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/marketplace:
    isNew: false
    popularity: 0
    isMultiInstall: false
    imageURL: ""
    moreInfo:
      - text: TIBCO BusinessWorks CE
        url: https://www.tibco.com/products/tibco-businessworks
        icon: docs
      - text: TIBCO Documentation
        icon: docs
        url: https://docs.tibco.com/products/tibco-businessworks-container-edition
      - text: Learning Resources
        icon: learning
        url: https://community.tibco.com/
      - text: GitHub Repository
        icon: github
        url: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/businessworks/articles/basics-of-bwce
  tags:
    - devhub-marketplace
    - bwce
    - tutorial
spec:
  owner: group:default/marketplace-entries-group
  type: document
  presentation:
    buttonLabels:
      createButtonText: Get
  parameters:
    - title: Accept the Marketplace Entry
      required:
        - accept
      errorMessage: Please accept the Marketplace Entry
      properties:
        description:
          type: "null"
          description: |
            ## Get  BW6 Basics Learning Guide added to your TIBCO Developer Hub

            **ID:** mp-entry-bwce-basics-guide

            **Description:** Comprehensive learning guide for TIBCO BusinessWorks 6 (BW6) fundamentals, featuring hands-on tutorials, sample applications, and practical exercises for developers new to BW6. 

            Each item made available to you in the TIBCO® Developer Hub Marketplace is subject to its own individual license. You are responsible for reviewing the specific license terms that apply to each item that you access or use. Cloud Software Group, Inc. and its affiliates: (1) do not make any representation, promises, or guarantees about these items; and (2) are making these items available to you "AS IS," without any warranties or indemnities.
            This item is subject to the following [license](https://github.com/TIBCOSoftware/tibco-developer-hub/blob/main/LICENSE.TXT).

            **By accessing or using this item, you agree to assume full responsibility for its proper use and compliance with all applicable license terms.**
        accept:
          title: I Agree
          type: boolean
          default: null
          enum:
            - null
            - true
  steps:
    - id: registerItem
      name: Getting Marketplace Entry...
      action: catalog:register
      input:
        catalogInfoUrl: https://github.com/TIBCOSoftware/tibco-developer-hub-marketplace/blob/main/businessworks/articles/basics-of-bwce/catalog-info.yaml
  output:
    links:
      - title: Open in catalog
        type: catalog
        icon: catalog
        entityRef: ${{ steps.registerItem.output.entityRef }}
      - title: Documents
        url: /docs?filters%5Buser%5D=all&limit=20
        icon: techdocs
      - title: Templates
        url: /create?filters%5Bkind%5D=template&filters%5Buser%5D=all&limit=20
        icon: kind:template
      - icon: docs
        title: Open BW6 Basics Guide Docs
        url: /docs/default/component/bwce-basics-learning-guide
        type: openButton
      - title: Back to Marketplace
        url: /marketplace
        icon: dashboard
