apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{values.name | dump}}
  description: ${{ "BW5CE App - " + values.name }}
  annotations:
    github.com/project-slug: ${{ values.destination.owner + "/" + values.destination.repo }}
    backstage.io/techdocs-ref: dir:.
    backstage.io/kubernetes-id: ${{ values.destination.owner + "/" + values.destination.repo }}
  tibco.developer.hub/topology:
    theme:
      colors:
        background: '#1a237e'
        iconColor: '#1a237e'
    entityIcon:
      icon: ""
      iconTooltip: "BW5CE App"
    statusIcons:
      - icon: 'VerifiedUser'
        iconColor: 'white'
        iconTooltip: 'Scan Passed...'
      - icon: 'CloudDone'
        iconColor: 'white'
        iconTooltip: 'Deployed successfully...'
  tibcoPlatformApps:
    - appType: bw5ce
      appName: ${{values.name }}
      dataPlaneName: DP-dev
      dpId: ${{values.dataplane_id }}
      appId: ${{values.appId }}
  links:
    - url: "https://www.tibco.com/"
      title: TIBCO Platform
      icon: dashboard
    - url: "vscode://vscode.git/clone?url=https://github.com/${{ values.destination.owner }}/${{ values.destination.repo }}"
      title: Open in VSCode
      icon: scaffolder
  tags:
    - platform
    - bw5ce

spec:
  type: service
  lifecycle: development
  owner: group:default/tibco-templates
