# system: ecommerce
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ecommerce-platform
  description: This system comprises a collection of interconnected services and APIs, including a storefront web application, catalog management, shopping cart functionality, order processing, and payment integration. It leverages a microservices architecture to provide scalability and flexibility
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - ecommerce
    - microservices
    - retail
  tibco.developer.hub/topology:
    theme:
      name: blue
    entityIcon:
      icon: Store
      iconTooltip: E-commerce Platform
    statusIcons:
      - icon: VerifiedUser
        iconColor: forestgreen
        iconTooltip: Production Ready
spec:
  owner: ecommerce-team
  domain: e-commerce
  environments:
    - name: production
      baseUrl: https://ecommerce.example.com
    - name: staging
      baseUrl: https://staging.ecommerce.example.com
    - name: development
      baseUrl: https://dev.ecommerce.example.com
---
# domain: ecommerce
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: e-commerce
  description: The e-commerce domain
  annotations:
    backstage.io/techdocs-ref: dir:.
  tags:
    - ecommerce
    - microservices
    - retail
  tibco.developer.hub/topology:
    theme:
      name: purple
    entityIcon:
      icon: Storefront
      iconTooltip: E-commerce Domain
spec:
  owner: group:default/ecommerce-team
---
# storefront.yaml
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: storefront
  description: The user-facing storefront website
  annotations:
    jenkins.io/job-full-name: storefront-relese-v1
    backstage.io/techdocs-ref: dir:.
  tags:
    - ecommerce
    - microservices
    - retail
  tibco.developer.hub/topology:
    theme:
      name: blue
    entityIcon:
      icon: Storefront
      iconTooltip: Storefront Web App
    statusIcons:
      - icon: Https
        iconColor: forestgreen
        iconTooltip: HTTPS Enabled
      - icon: Devices
        iconColor: steelblue
        iconTooltip: Responsive Design
      - icon: Language
        iconColor: blue
        iconTooltip: Multi-language Support
spec:
  type: service
  lifecycle: production
  owner: group:default/ecommerce-team
  system: ecommerce-platform
  providesApis:
    - api:default/catalog-api
    - api:default/cart-api
    - api:default/checkout-api
  consumesApis:
    - catalog-api
    - checkout-api
    - shipping-api
    - cart-api
  dependsOn:
    - component:default/user-service
    - component:default/inventory-service
    - component:default/order-service
    - component:default/shipping-service
    - resource:default/payment-gateway
  apiConsumedBy:
    - component:default/user-service
    - component:default/inventory-service
    - component:default/order-service
    - component:default/shipping-service
    - resource:default/payment-gateway
---
# catalog-api.yaml
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: catalog-api
  description: Provides product catalog information
  annotations:
    backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/topology:
    theme:
      name: yellow
    entityIcon:
      icon: MenuBook
      iconTooltip: Product Catalog API
spec:
  type: openapi
  lifecycle: production
  owner: group:default/catalog-team

  dependsOn:
    - resource:default/catalog-database
    - component:default/inventory-service
  apiConsumedBy:
    - component:default/storefront
  definition:
    $text: ./apis/catalog/catalog-api.yaml
---
