# inventory-api.yaml
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: inventory-api
  description: Manages product inventory levels, stock tracking, and availability
  annotations:
    backstage.io/techdocs-ref: dir:.
  tibco.developer.hub/topology:
    theme:
      name: yellow
    entityIcon:
      icon: Inventory
      iconTooltip: Inventory API
spec:
  type: openapi
  lifecycle: production
  owner: group:default/inventory-team
  system: ecommerce-platform
  apiConsumedBy:
    - component:default/inventory-service
    - component:default/catalog-api
  definition: |
    openapi: 3.0.0
    info:
      title: Inventory API
      version: v1
    paths:
      /inventory/{productId}:
        get:
          summary: Get inventory level for product
          responses:
            '200':
              description: Inventory level
        put:
          summary: Update inventory level
          responses:
            '200':
              description: Inventory updated
      /inventory/check:
        post:
          summary: Check availability for multiple products
          responses:
            '200':
              description: Availability status
